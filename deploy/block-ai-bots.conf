# Refuse known AI / LLM crawlers and dataset scrapers at the edge.
# Included from each site's :443 server block. robots.txt asks politely;
# this enforces it for bots that send an honest User-Agent.
#
# Install once per server:  cp deploy/block-ai-bots.conf /etc/nginx/snippets/
# Then add to any vhost's serving block:  include snippets/block-ai-bots.conf;
if ($http_user_agent ~* "(GPTBot|OAI-SearchBot|ChatGPT-User|ClaudeBot|Claude-Web|anthropic-ai|Claude-SearchBot|Claude-User|Google-Extended|Applebot-Extended|PerplexityBot|Perplexity-User|Meta-ExternalAgent|meta-externalagent|FacebookBot|Bytespider|Amazonbot|CCBot|cohere-ai|Diffbot|Omgilibot|ImagesiftBot|YouBot|AI2Bot|Timpibot)") {
    return 403;
}
